# fly.toml app configuration file generated for pr-stack on 2026-02-26T00:10:56+13:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "pr-stack"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
  
  [http_service.concurrency]
    type = "requests"
    hard_limit = 15
    soft_limit = 10

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[env]
  PORT = "8080"
